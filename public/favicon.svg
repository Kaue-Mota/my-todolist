<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#030712"/>

  <!-- Outer ring track -->
  <circle cx="16" cy="16" r="11" stroke="#1f2937" stroke-width="2.5" fill="none"/>

  <!-- Progress arc (~75% filled, rose color) -->
  <circle
    cx="16" cy="16" r="11"
    stroke="#f43f5e"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
    stroke-dasharray="69.12 23.04"
    transform="rotate(-90 16 16)"
  />

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#f43f5e"/>

  <!-- Clock hand -->
  <line x1="16" y1="16" x2="16" y2="9" stroke="#f43f5e" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="20" y2="16" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round"/>
</svg>
